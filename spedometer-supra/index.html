<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Supra Inspired Instrument Cluster</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <div class="bg-glow"></div>

        <div class="cluster">
            <!-- LEFT PANEL -->
            <div class="side-panel left-panel">
                <div class="turn-signal left-signal">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                    </svg>
                </div>

                <div class="info-group">
                    <div class="info-label">RANGE</div>
                    <div class="info-value">320 <span class="unit">km</span></div>
                </div>

                <div class="vertical-gauge">
                    <div class="gauge-icon">⛽</div>
                    <div class="v-bar-track">
                        <div class="v-bar-fill fuel-fill"></div>
                    </div>
                    <div class="gauge-markers">
                        <span>F</span>
                        <span>1/2</span>
                        <span>E</span>
                    </div>
                </div>
            </div>

            <!-- CENTER PANEL -->
            <div class="center-panel">
                <div class="speedometer-wrapper">
                    <!-- SVG for circular speed track -->
                    <svg class="speedometer-svg" viewBox="0 0 400 400">
                        <defs>
                            <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ff3333" />
                                <stop offset="100%" stop-color="#b30000" />
                            </linearGradient>
                            <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="6" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        <!-- Speed Background -->
                        <circle class="track-bg" cx="200" cy="200" r="170" />
                        <!-- Speed Fill -->
                        <circle class="speed-track" cx="200" cy="200" r="170" />
                        <!-- Speed Ticks -->
                        <g class="ticks-group"></g>

                        <!-- RPM Background (Inner arc) -->
                        <circle class="rpm-track-bg" cx="200" cy="200" r="120" />
                        <circle class="rpm-track" cx="200" cy="200" r="120" />
                    </svg>

                    <!-- RPM Ticks overlay -->
                    <div class="rpm-labels">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span
                            class="red">7</span><span class="red">8</span>
                    </div>

                    <div class="center-display">
                        <div class="gear-indicator">
                            <span class="gear">P</span>
                            <span class="gear">R</span>
                            <span class="gear">N</span>
                            <span class="gear active">D</span>
                            <span class="gear manual">1</span>
                        </div>

                        <div class="speed-value">0</div>
                        <div class="speed-unit">KM/H</div>

                        <div class="drive-mode">SPORT</div>
                    </div>

                    <!-- Speed Needle -->
                    <div class="needle-container">
                        <div class="needle">
                            <div class="needle-center"></div>
                        </div>
                    </div>
                </div>

                <!-- Bottom Warnings & ODO -->
                <div class="bottom-info">
                    <div class="warning-lights">
                        <span class="icon warning">⚠️</span>
                        <span class="icon engine">🛠️</span>
                        <span class="icon battery">🔋</span>
                        <span class="icon oil">🛢️</span>
                        <span class="icon seatbelt active">💺</span>
                    </div>
                    <div class="odometer">ODO 12,458 km</div>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="side-panel right-panel">
                <div class="turn-signal right-signal">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M4 11h12.17l-5.59-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4v-2z" />
                    </svg>
                </div>

                <div class="info-group">
                    <div class="info-label">AVG FUEL</div>
                    <div class="info-value">8.5 <span class="unit">L/100</span></div>
                </div>

                <div class="vertical-gauge">
                    <div class="gauge-icon">🌡️</div>
                    <div class="v-bar-track">
                        <div class="v-bar-fill temp-fill"></div>
                    </div>
                    <div class="gauge-markers">
                        <span class="red">H</span>
                        <span></span>
                        <span>C</span>
                    </div>
                </div>

                <div class="assist-icons">
                    <span class="lane-assist active">🛣️</span>
                    <span class="cruise-icon">🚗</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Effects -->
    <audio id="engineSound" src="https://assets.mixkit.co/active_storage/sfx/1547/1547-preview.mp3"
        preload="auto"></audio>
    <audio id="highSpeedSound" src="https://assets.mixkit.co/active_storage/sfx/1548/1548-preview.mp3"
        preload="auto"></audio>
    <audio id="startupSound" src="https://assets.mixkit.co/active_storage/sfx/1841/1841-preview.mp3"
        preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
