<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Finance Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="screen">
  
  <div class="mascot-container">
    <div class="speech-bubble">Welcome!</div>
    <div class="mascot">
      <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
      <div style="position: absolute; top: 46px; left: 16px; width: 48px; display: flex; justify-content: space-between;">
          <div style="width: 10px; height: 6px; background: rgba(255,100,100,0.5); border-radius: 50%;"></div>
          <div style="width: 10px; height: 6px; background: rgba(255,100,100,0.5); border-radius: 50%;"></div>
      </div>
      <div class="smile"></div>
      <div class="mascot-antenna"></div>
      <div class="arm arm-left"></div>
      <div class="arm arm-right"></div>
    </div>
  </div>

  <div class="intro-scene">
    <div class="wallet-container">
      <div class="wallet">
        <div class="wallet-back"></div>
        <div class="items">
          <div class="item item-coin">
            <svg viewBox="0 0 24 24" fill="var(--item-yellow)"><circle cx="12" cy="12" r="10" stroke="#FFF" stroke-width="2"/><path d="M12 6v12M9 9h6M9 15h6" stroke="#FFF" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <div class="item item-cash">
            <svg viewBox="0 0 24 24" fill="var(--item-green)"><rect x="2" y="5" width="20" height="14" rx="3" stroke="#FFF" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="#FFF" stroke-width="2"/></svg>
          </div>
          <div class="item item-receipt">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-light)" stroke-width="2.5" stroke-linecap="round"><path d="M4 2v20l2-2 2 2 2-2 2 2 2-2 2 2 2-2 2 2V2z"/><path d="M8 8h8M8 12h8M8 16h4"/></svg>
          </div>
          <div class="item item-chart">
            <svg viewBox="0 0 24 24" fill="var(--item-blue)"><rect x="1" y="1" width="22" height="22" rx="6" fill="var(--item-blue)"/><path d="M6 15l4-4 4 4 4-6" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </div>
        </div>
        <div class="wallet-front">
        </div>
        <div class="wallet-flap"></div>
      </div>
    </div>
  </div>

  <div class="ui-scene">
    <div class="ui-header">
       <h1>Sanctuary</h1>
       <p>Welcome back, Alex</p>
    </div>
    
    <div class="ui-card balance-card">
      <div class="balance-title">Total Balance</div>
      <div class="balance-amount">$12,450.00</div>
    </div>
    
    <div class="ui-card flex-row">
      <div class="action-btn">
         <svg viewBox="0 0 24 24"><path d="M12 4v16m-6-6l6 6 6-6"/></svg>
      </div>
      <div class="action-btn">
         <svg viewBox="0 0 24 24"><path d="M12 20V4m-6 6l6-6 6 6"/></svg>
      </div>
      <div class="action-btn">
         <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
      </div>
      <div class="action-btn">
         <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>

    <div class="ui-card pie-chart-card">
      <div class="pie-chart"></div>
      <div style="flex:1; margin-left: 18px;">
         <div class="tx-title">Monthly View</div>
         <div class="tx-date">Analytics Dashboard</div>
      </div>
    </div>
    
    <div class="ui-card">
      <div class="tx-item">
        <div class="tx-icon"><svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div>
        <div class="tx-info"><div class="tx-title">Dribbble Pro</div><div class="tx-date">Today, 10:45 AM</div></div>
        <div class="tx-amount">-$12.00</div>
      </div>
      <div class="tx-item">
        <div class="tx-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
        <div class="tx-info"><div class="tx-title">Upwork Escrow</div><div class="tx-date">Yesterday</div></div>
        <div class="tx-amount pos">+$250.00</div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
